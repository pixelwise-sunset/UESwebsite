<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 合作伙伴</title>
    <style>
        /* 公共样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            background-color: #f8f9fa;
        }

        /* 头部样式 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            height: 80px;
            width: auto;
            display: block;
        }

        /* 导航菜单 */
        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
            align-items: center;
        }

        nav ul li a {
            text-decoration: none;
            color: #666;
            font-size: 25px;
            font-weight: 500;
            transition: color 0.3s;
            letter-spacing: 0.5px;
            display: block;
            padding: 10px 0;
        }

        nav ul li a:hover {
            color: #0066cc;
        }

        /* 轮播图容器 */
        .banner-container {
            position: relative;
            width: 100%;
            height: 70vh;
            overflow: hidden;
            transition: height 0.8s ease;
        }

        .banner-container.small {
            height: 300px;
        }

        .banner-slider {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .banner-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
        }

        .banner-slide.active {
            opacity: 1;
            transform: translateY(0);
        }

        .banner-slide video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 联系我们区域 */
        .contact-section {
            padding: 80px 50px;
            min-height: 600px;
        }

        .contact-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .contact-header h2 {
            font-size: 42px;
            font-weight: 300;
            color: #333;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* Tab 导航 */
        .tab-navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
            margin-bottom: 50px;
        }

        .tab-btn {
            padding: 10px 40px;
            background-color: transparent;
            border: none;
            color: #666;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            position: relative;
        }

        .tab-btn:hover {
            color: #1976d2;
        }

        .tab-btn.active {
            color: #1976d2;
            font-weight: 600;
        }

        .tab-btn:not(:last-child)::after {
            content: '|';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            color: #1976d2;
            font-size: 20px;
            font-weight: 300;
        }

        /* Tab 内容 */
        .tab-content-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 合作伙伴网格布局 */
        .partners-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);  /* 每行显示两个元素 */
            gap: 30px;
            padding: 20px;
            justify-items: center;
        }

        /* 单个合作伙伴的卡片 */
        .partner-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            cursor: pointer;
            width: 400px;
            height: auto;
            background-color: #fff;
        }

        .partner-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        /* 合作伙伴logo样式 */
        .partner-logo {
            max-width: 100%;
            height: 150px;
            width: auto;
            object-fit: contain;
            margin-bottom: 20px;
        }

        /* 合作伙伴名称超链接样式 */
        .partner-link {
            font-size: 18px;
            color: #007bff;
            text-decoration: none;
            font-weight: 600;
            margin-top: auto;
        }

        .partner-link:hover {
            text-decoration: underline;
        }

        /* 底部样式 */
        .site-footer {
            background-color: #1e1e1e;
            color: #ccc;
            text-align: center;
            padding: 20px 10px;
            font-size: 14px;
            line-height: 1.6;
            border-top: 1px solid #333;
        }

        .footer-content a {
            color: #9ad0ff;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-content a:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }
            nav ul {
                gap: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .banner-container {
                height: 400px;
            }
            .contact-section {
                padding: 50px 20px;
            }
            .contact-header h2 {
                font-size: 28px;
                letter-spacing: 3px;
            }
            .tab-btn {
                padding: 10px 20px;
                font-size: 14px;
            }
            .tab-btn:not(:last-child)::after {
                font-size: 16px;
            }
            .partners-grid {
                grid-template-columns: 1fr;
            }
            .partner-card {
                width: 100%;
                max-width: 400px;
            }
        }
    </style>
</head>

    <script>
        // Banner 逻辑
        const bannerContainer = document.querySelector('.banner-container');
        document.addEventListener("click", function(event) {
            if (!bannerContainer.contains(event.target)) {
                bannerContainer.classList.add("small");
            }
        });
        bannerContainer.addEventListener("click", function(event) {
            event.stopPropagation();
            this.classList.remove("small");
        });

        // 视频自动播放逻辑
        const video = document.querySelector('.banner-slide video');
        if (video) {
            video.addEventListener('ended', () => {
                video.currentTime = 0;
                video.play();
            });
            video.play().catch(e => console.log(e));
        }
    </script>
