<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们</title>
    <style>
        /* 公共样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            background-color: #f8f9fa;
        }

        /* 头部样式 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: relative;
            z-index: 1000;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            height: 80px;
            width: auto;
            display: block;
        }

        /* 导航菜单 */
        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
            align-items: center;
        }

        nav ul li a {
            text-decoration: none;
            color: #666;
            font-size: 25px;
            font-weight: 500;
            transition: color 0.3s;
            letter-spacing: 0.5px;
            display: block;
            padding: 10px 0;
        }

        nav ul li a:hover {
            color: #0066cc;
        }

        /* 轮播图容器 */
        .banner-container {
            position: relative;
            width: 100%;
            height: 70vh;
            overflow: hidden;
            transition: height 0.8s ease;
        }

        .banner-container.small {
            height: 300px;
        }

        .banner-slider {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .banner-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
        }

        .banner-slide.active {
            opacity: 1;
            transform: translateY(0);
        }

        .banner-slide video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 联系我们区域 */
        .contact-section {
            padding: 80px 50px;
            min-height: 600px;
        }

        .contact-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .contact-header h2 {
            font-size: 42px;
            font-weight: 300;
            color: #333;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* Tab 导航 */
        .tab-navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
            margin-bottom: 50px;
        }

        .tab-btn {
            padding: 10px 40px;
            background-color: transparent;
            border: none;
            color: #666;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            position: relative;
        }

        .tab-btn:hover {
            color: #1976d2;
        }

        .tab-btn.active {
            color: #1976d2;
            font-weight: 600;
        }

        .tab-btn:not(:last-child)::after {
            content: '|';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            color: #1976d2;
            font-size: 20px;
            font-weight: 300;
        }

        /* Tab 内容 */
        .tab-content-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 联系人网格布局 */
        .contact-grid {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
            padding: 20px;
        }

        /* 单个联系人卡片 */
        .contact-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 300px;
            text-align: center;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .contact-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        /* 头像样式 */
        .contact-avatar1 {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin-bottom: 25px;
            background-image: url('images/members/xietian.jpg');
            background-size: cover;
            background-position: center;
            border: 4px solid #f0f2f5;
        }

        .contact-avatar2 {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin-bottom: 25px;
            background-image: url('images/members/yanjiusheng/陈靖雯.jpg');
            background-size: cover;
            background-position: center;
            border: 4px solid #f0f2f5;
        }

        .contact-card h3 {
            font-size: 24px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .contact-info {
            font-size: 16px;
            color: #666;
            margin-bottom: 10px;
            line-height: 1.6;
            width: 100%;
            word-break: break-all;
        }

        .contact-info strong {
            color: #333;
            margin-right: 5px;
        }

        .contact-info-extra {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            color: #1976d2;
            font-weight: 500;
            width: 100%;
        }

        /* 底部样式 */
        .site-footer {
            background-color: #1e1e1e;
            color: #ccc;
            text-align: center;
            padding: 20px 10px;
            font-size: 14px;
            line-height: 1.6;
            border-top: 1px solid #333;
        }

        .footer-content a {
            color: #9ad0ff;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-content a:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }
            nav ul {
                gap: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }
            .banner-container {
                height: 400px;
            }
            .contact-section {
                padding: 50px 20px;
            }
            .contact-header h2 {
                font-size: 28px;
                letter-spacing: 3px;
            }
            .tab-btn {
                padding: 10px 20px;
                font-size: 14px;
            }
            .tab-btn:not(:last-child)::after {
                font-size: 16px;
            }
            .contact-card {
                padding: 30px 20px;
                width: 100%;
                max-width: 300px;
            }
            .contact-avatar1, .contact-avatar2 {
                width: 150px;
                height: 150px;
            }
            .contact-card h3 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <header>
        <div class="logo">
            <img src="images/logo.png" alt="UES Logo" class="logo-img">
        </div>
        <nav>
            <ul>

                <li><a href="publications-journals.html">成果</a></li>

                <li><a href="contact-us.html" style="color: #0066cc;">联系我们</a></li>
            </ul>
        </nav>
    </header>

    <!-- 轮播图区域 -->
    <div class="banner-container">
        <div class="banner-slider">
            <div class="banner-slide active">
                <video src="images/video11.mp4" muted autoplay playsinline></video>

    </div>

    <!-- 联系我们区域 -->
    <section class="contact-section">
        <div class="contact-header">
            <h2>联系我们</h2>
        </div>

        <!-- Tab 导航 -->
        <div class="tab-navigation">

            <a href="contact-partners.html" class="tab-btn">合作伙伴</a>

        <!-- Tab 内容: 联系我们 -->
        <div class="tab-content-inner">
            <div class="contact-grid">
                <div class="contact-card">
                    <div class="contact-avatar1"></div>
                    <h3>谢天</h3>
                    <p class="contact-info"><strong>邮箱：</strong>tian_xie@sjtu.edu.cn</p>
                    <div class="contact-info-extra">团队合作</div>
                </div>
                <div class="contact-card">
                    <!-- 圆形头像 -->
                    <div class="contact-avatar2"></div>
                    
                    <!-- 姓名 -->
                    <h3>陈靖雯</h3>
                    
                    <!-- 联系信息 -->
                     <p class="contact-info"><strong>邮箱：</strong>chenjingwen@sjtu.edu.cn</p>
                    <div class="contact-info-extra">
                        网络支持
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 网页底部 -->
    <footer class="site-footer">
        <div class="footer-content">
            <p>© 2025 UES Group | All Rights Reserved</p>
            <p>
                <a href="https://beian.miit.gov.cn/" target="_blank">
                    沪交ICP备20250301
                </a>
            </p>
        </div>
    </footer>

    <script>
        // Banner 逻辑
        const bannerContainer = document.querySelector('.banner-container');
        bannerContainer.classList.add("small");

        // 视频自动播放逻辑
        const video = document.querySelector('.banner-slide video');
        if (video) {
            video.addEventListener('ended', () => {
                video.currentTime = 0;
                video.play();
            });
            video.play().catch(e => console.log(e));
        }
    </script>
</body>
</html>
